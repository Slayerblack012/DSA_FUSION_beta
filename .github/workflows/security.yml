name: Security Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Security baseline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Bandit
        run: |
          python -m bandit -r app -f sarif -o bandit.sarif -ll || true
          if [ ! -f bandit.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://schemastore.azurewebsites.net/schemas/json/sarif-2.1.0-rtm.5.json","runs":[{"tool":{"driver":{"name":"Bandit"}},"results":[]}]}' > bandit.sarif
          fi

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/bandit.sarif
          category: bandit

      - name: Run gitleaks
        working-directory: .
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif --no-banner --exit-code 0 || true
          if [ ! -f gitleaks.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://schemastore.azurewebsites.net/schemas/json/sarif-2.1.0-rtm.5.json","runs":[{"tool":{"driver":{"name":"Gitleaks"}},"results":[]}]}' > gitleaks.sarif
          fi

      - name: Upload gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Security summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def count_results(path: Path) -> int:
              if not path.exists():
                  return 0
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return 0
              total = 0
              for run in data.get("runs", []):
                  total += len(run.get("results", []))
              return total

          summary = [
              "## Security Scan Summary",
              "",
              f"- Bandit findings: {count_results(Path('bandit.sarif'))}",
              f"- Gitleaks findings: {count_results(Path('../gitleaks.sarif'))}",
              "",
              "Artifacts uploaded as SARIF for GitHub code scanning.",
          ]

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              Path(summary_path).write_text("\n".join(summary) + "\n", encoding="utf-8")
          PY
